apiVersion: v1
kind: Namespace
metadata:
  name: mongodb
  labels:
    project: mongodb
    environment: dev
    purpose: poc

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: mongodb
  labels:
    app: mongo
    project: roboshop
    environment: dev
    purpose: poc

  annotations:
    kubernetes.io/change-cause: "v1 mongo deployment"

    # the namespace in which the deployment will be created 
spec:
  replicas: 1
  selector:
    matchLabels:
      
      app: mongo
      project: roboshop
      environment: dev
      purpose: poc

# the pod template

  template:
    metadata:
      labels:
        app: mongo
        project: roboshop
        environment: dev
        purpose: poc
    spec:
      containers:
      - name: mongodb
        image: sandeep0109/mongodb:2.2.2
        ports:
        - containerPort: 27017

---

#nodeport service


apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    purpose: poc

spec:
  type: ClusterIP
  selector:
    app: mongo
    project: roboshop
    environment: dev
    purpose: poc 
  ports:
  - protocol: TCP
    port: 27017  #service port
    targetPort: 27017 #container port